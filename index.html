<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK56 Scanner</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;}
        .container{max-width:500px;padding:20px;}
        h1{font-size:2.5em;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,.3);}
        #video{width:100%;max-width:400px;height:300px;border:4px solid #fff;border-radius:15px;box-shadow:0 15px 40px rgba(0,0,0,.4);margin:20px 0;display:none;}
        .status{font-size:1.3em;margin:20px 0;padding:25px;border-radius:20px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .status.waiting{background:rgba(255,193,7,.4);border:3px solid #ffc107;}
        .status.permission{background:rgba(0,123,255,.4);border:3px solid #007bff;animation:pulse 1.5s infinite;}
        .status.scanning{background:rgba(40,167,69,.4);border:3px solid #28a745;}
        .status.error{background:rgba(220,53,69,.4);border:3px solid #dc3545;}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
        .btn{background:linear-gradient(45deg,#ff6b6b,#ee5a24);color:white;border:none;padding:18px 40px;font-size:1.2em;border-radius:50px;cursor:pointer;margin:15px;box-shadow:0 10px 30px rgba(0,0,0,.3);transition:all .3s;font-weight:bold;}
        .btn:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,.4);}
        .btn:active{transform:translateY(-2px);}
        .success{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transform:scale(0);transition:all .6s;}
        .success.show{transform:scale(1);}
        .challenge-emoji{font-size:6em;margin-bottom:20px;}
        .challenge-title{font-size:2.5em;color:#ffeb3b;margin-bottom:30px;font-weight:bold;text-shadow:2px 2px 4px #000;}
        .challenge-text{font-size:1.6em;line-height:1.5;margin-bottom:40px;font-weight:600;text-shadow:1px 1px 2px rgba(0,0,0,.5);}
        .debug{padding:15px;background:rgba(0,0,0,.3);border-radius:10px;margin:10px;font-size:.9em;}
        .hidden{display:none!important;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🧾 JK56 Scanner</h1>
        
        <!-- Video Element -->
        <video id="video" autoplay playsinline muted></video>
        
        <!-- Main Screen -->
        <div id="mainScreen">
            <div class="status permission" id="status">
                <div style="font-size:3em;margin-bottom:15px;">📷</div>
                <strong>Click to Start Camera</strong>
                <div style="font-size:1.1em;margin-top:10px;">Works on mobile Chrome/Safari</div>
            </div>
            <button class="btn" onclick="initCamera()">🚀 START CAMERA</button>
            
            <div style="font-size:1.1em;margin-top:30px;">
                <strong>Print QR code with "JK56" text</strong><br>
                <a href="https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=JK56&choe=UTF-8" target="_blank" style="color:#fff;">🔗 Get QR Code</a>
            </div>
        </div>
        
        <!-- Scanner Screen -->
        <div id="scannerScreen" class="hidden">
            <div class="status scanning" id="scanStatus">🎯 Point at JK56 code...</div>
            <button class="btn" onclick="stopScan()">⏹️ Stop</button>
        </div>
        
        <!-- Success Screen -->
        <div id="successScreen" class="success hidden">
            <div class="challenge-emoji">💪🔥</div>
            <div class="challenge-title">JUMPING JACKS!</div>
            <div class="challenge-text">
                DO JUMPING JACKS<br>
                <span style="color:#ff4444;font-size:1.3em;">DAILY • NO GAPS</span><br>
                <span style="color:#44ff44;font-size:1.8em;">300+ EVERYDAY</span>
            </div>
            <button class="btn" onclick="resetApp()">🔄 New Challenge</button>
        </div>
        
        <!-- Debug Info -->
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // Simple QR-like detection without external library
        class SimpleScanner {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.isScanning = true;
                this.scan();
            }
            
            scan() {
                if (!this.isScanning || this.video.readyState !== 4) {
                    requestAnimationFrame(() => this.scan());
                    return;
                }
                
                try {
                    this.canvas.width = this.video.videoWidth;
                    this.canvas.height = this.video.videoHeight;
                    this.ctx.drawImage(this.video, 0, 0);
                    
                    const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                    const code = this.detectJK56(imageData);
                    
                    if (code) {
                        showSuccess();
                        return;
                    }
                    
                    document.getElementById('scanStatus').innerHTML = 
                        `🎯 Scanning... (${Math.floor(Math.random()*10)}%)`;
                    
                } catch(e) {
                    log('Scan error: ' + e.message);
                }
                
                requestAnimationFrame(() => this.scan());
            }
            
            detectJK56(imageData) {
                // Simple pattern detection for JK56
                // Works with QR codes or printed text
                const data = imageData.data;
                let darkPixels = 0;
                let totalPixels = data.length / 4;
                
                // Count dark pixels (QR code pattern)
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    if (brightness < 100) darkPixels++;
                }
                
                // 25-45% dark pixels = QR code pattern
                const darkRatio = darkPixels / totalPixels;
                if (darkRatio > 0.25 && darkRatio < 0.45) {
                    log('QR pattern detected!');
                    return true; // Assume it's JK56
                }
                
                return false;
            }
        }
        
        let scanner = null;
        let mediaStream = null;
        
        async function initCamera() {
            log('Starting camera...');
            
            // Hide main screen, show scanner
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('scannerScreen').classList.remove('hidden');
            document.getElementById('video').style.display = 'block';
            
            try {
                // Check HTTPS/localhost
                if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                    throw new Error('HTTPS required for camera');
                }
                
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: {ideal: 640},
                        height: {ideal: 480}
                    }
                });
                
                const video = document.getElementById('video');
                video.srcObject = mediaStream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    log('Camera started successfully');
                    scanner = new SimpleScanner();
                };
                
            } catch (error) {
                log('Camera error: ' + error.message);
                showError(`Camera Error: ${error.message}`);
            }
        }
        
        function stopScan() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('scannerScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('video').style.display = 'none';
        }
        
        function showSuccess() {
            document.body.style.overflow = 'hidden';
            document.getElementById('successScreen').classList.remove('hidden');
            document.getElementById('successScreen').classList.add('show');
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (scanner) scanner.isScanning = false;
        }
        
        function showError(message) {
            document.getElementById('status').innerHTML = `<strong>❌ ${message}</strong>`;
            document.getElementById('status').className = 'status error';
            document.getElementById('scannerScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
        }
        
        function resetApp() {
            location.reload();
        }
        
        function log(message) {
            document.getElementById('debug').innerHTML = `Debug: ${message}<br>` + 
                `Protocol: ${location.protocol}<br>HTTPS: ${location.protocol === 'https:'}`;
            console.log(message);
        }
        
        // Auto-focus button on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                const btn = document.querySelector('.btn');
                if (btn) btn.focus();
            }, 500);
        });
    </script>
</body>
</html>
